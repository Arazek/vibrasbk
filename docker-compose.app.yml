# Application layer — NestJS API
# Requires the infrastructure stack (infra.docker-compose.yml) to be running first.
#
# Start:   docker compose -f docker-compose.app.yml up -d --build
# Stop:    docker compose -f docker-compose.app.yml down
# Rebuild: docker compose -f docker-compose.app.yml up -d --build --force-recreate

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: dance-app-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3333
      # Database — postgresdb is the container name defined in infra.docker-compose.yml
      DB_HOST: postgresdb
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      # App secrets
      JWT_SECRET: ${JWT_SECRET}
      # Firebase (FCM push notifications)
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
    volumes:
      - uploads:/app/apps/api/uploads
    networks:
      - proxy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${API_HOST}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=3333"

# proxy-network is owned by infra.docker-compose.yml
networks:
  proxy-network:
    external: true
    name: proxy-network

volumes:
  uploads:
