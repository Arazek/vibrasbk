version: '3.8'

# Application layer — NestJS API + Redis
# Requires the infrastructure stack (infra.docker-compose.yml) to be running first.
#
# To start:   docker compose -f docker-compose.app.yml up -d --build
# To stop:    docker compose -f docker-compose.app.yml down
# To rebuild: docker compose -f docker-compose.app.yml up -d --build --force-recreate

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: dance-app-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3333
      # Database — matches infra postgres container name and vars
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      # App secrets
      JWT_SECRET: ${JWT_SECRET}
      # Optional integrations
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
    volumes:
      - uploads:/app/apps/api/uploads
    networks:
      - proxy-network
    depends_on:
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${API_HOST}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=3333"

  redis:
    image: redis:7-alpine
    container_name: dance-app-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - proxy-network

# proxy-network is owned by infra.docker-compose.yml
networks:
  proxy-network:
    external: true
    name: proxy-network

volumes:
  uploads:
  redis_data:
