version: '3.8'

# Development infrastructure — PostgreSQL + Redis for local development.
# Used by `./run.sh start` to spin up backing services on localhost.
#
# Start:  docker compose up -d
# Stop:   docker compose down

services:
  redis:
    image: redis:7-alpine
    container_name: dev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
